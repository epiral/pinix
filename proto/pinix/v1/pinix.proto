syntax = "proto3";

package pinix.v1;

option go_package = "github.com/epiral/pinix/gen/go/pinix/v1;pinixv1";

// ─── PinixService ──────────────────────────────────────────────
// Super Agent Token 持有者使用，拥有整机权限
service PinixService {
  // 管理 Clip
  rpc CreateClip(CreateClipRequest) returns (CreateClipResponse);
  rpc ListClips(ListClipsRequest) returns (ListClipsResponse);
  rpc DeleteClip(DeleteClipRequest) returns (DeleteClipResponse);

  // 管理 Token
  rpc GenerateToken(GenerateTokenRequest) returns (GenerateTokenResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);
}

// ─── ClipService ───────────────────────────────────────────────
// Clip Token 持有者使用，权限绑定特定 workdir
service ClipService {
  // 执行 commands/ 下的可执行文件
  rpc Invoke(InvokeRequest) returns (InvokeResponse);

  // 流式读取 workdir 下的文件
  rpc ReadFile(ReadFileRequest) returns (stream ReadFileChunk);
}

// ── Clip 管理 ──

message CreateClipRequest {
  string name    = 1;
  string workdir = 2;
}

message CreateClipResponse {
  string clip_id = 1;
}

message ListClipsRequest {}

message ListClipsResponse {
  repeated Clip clips = 1;
}

message Clip {
  string clip_id = 1;
  string name    = 2;
  string workdir = 3;
}

message DeleteClipRequest {
  string clip_id = 1;
}

message DeleteClipResponse {}

// ── Token 管理 ──

message GenerateTokenRequest {
  string clip_id = 1;
  string label   = 2;
}

message GenerateTokenResponse {
  string token = 1;
}

message RevokeTokenRequest {
  string token = 1;
}

message RevokeTokenResponse {}

// ── Invoke ──

message InvokeRequest {
  string name          = 1;
  repeated string args = 2;
  string stdin         = 3;
}

message InvokeResponse {
  string stdout    = 1;
  string stderr    = 2;
  int32  exit_code = 3;
}

// ── ReadFile ──

message ReadFileRequest {
  string path          = 1;  // 相对 workdir: "web/index.html", "data/voice.mp3"
  int64  offset        = 2;  // 字节偏移，0 = 从头
  int64  length        = 3;  // 请求字节数，0 = 到末尾
  string if_none_match = 4;  // 客户端持有的 ETag
}

message ReadFileChunk {
  bytes  data         = 1;  // 本 chunk 数据
  int64  offset       = 2;  // 本 chunk 在文件中的起始偏移
  string mime_type    = 3;  // 每个 chunk 都携带（Go 服务端用 mime.TypeByExtension 推断）
  int64  total_size   = 4;  // 文件总大小，每个 chunk 都携带
  string etag         = 5;  // 文件当前 ETag
  bool   not_modified = 6;  // true = 内容未变，客户端用本地缓存
}
