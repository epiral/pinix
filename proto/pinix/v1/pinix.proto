syntax = "proto3";

package pinix.v1;

option go_package = "github.com/epiral/pinix/gen/go/pinix/v1;pinixv1";

// ─── AdminService ─────────────────────────────────────────────
// Super Token holders only. Manages clips and tokens on the server.
service AdminService {
  // Clip management
  rpc CreateClip(CreateClipRequest) returns (CreateClipResponse);
  rpc ListClips(ListClipsRequest) returns (ListClipsResponse);
  rpc DeleteClip(DeleteClipRequest) returns (DeleteClipResponse);

  // Token management
  rpc GenerateToken(GenerateTokenRequest) returns (GenerateTokenResponse);
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);
}

// ─── ClipService ──────────────────────────────────────────────
// Clip Token holders. Scoped to a single clip's workdir.
service ClipService {
  // Execute a command script under commands/ (streaming stdout/stderr)
  rpc Invoke(InvokeRequest) returns (stream InvokeChunk);

  // Stream-read a file under web/ or data/
  rpc ReadFile(ReadFileRequest) returns (stream ReadFileChunk);

  // Return clip metadata (name, description, commands, has_web)
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
}

// ── Clip management ──

message CreateClipRequest {
  string name    = 1;
  string workdir = 2;
}

message CreateClipResponse {
  string clip_id = 1;
}

message ListClipsRequest {}

message ListClipsResponse {
  repeated ClipInfo clips = 1;
}

message ClipInfo {
  string          clip_id     = 1;
  string          name        = 2;
  string          description = 3;
  repeated string commands    = 4;
  bool            has_web     = 5;
  bool            online      = 6;
}

message DeleteClipRequest {
  string clip_id = 1;
}

message DeleteClipResponse {}

// ── Token management ──

message GenerateTokenRequest {
  string clip_id = 1;  // required — cannot generate Super Token via API
  string label   = 2;
}

message GenerateTokenResponse {
  string id    = 1;
  string token = 2;
}

message ListTokensRequest {}

message ListTokensResponse {
  repeated TokenInfo tokens = 1;
}

message TokenInfo {
  string id         = 1;
  string clip_id    = 2;
  string label      = 3;
  string created_at = 4;  // RFC 3339
  string hint       = 5;  // last 4 chars of token
}

message RevokeTokenRequest {
  string id = 1;  // revoke by token id, not token value
}

message RevokeTokenResponse {}

// ── Invoke ──

message InvokeRequest {
  string          name  = 1;
  repeated string args  = 2;
  string          stdin = 3;
}

message InvokeChunk {
  oneof payload {
    bytes stdout    = 1;
    bytes stderr    = 2;
    int32 exit_code = 3;  // final chunk — signals command completion
  }
}

// ── ReadFile ──

message ReadFileRequest {
  string path          = 1;  // relative to workdir: "web/index.html", "data/voice.mp3"
  int64  offset        = 2;  // byte offset, 0 = from start
  int64  length        = 3;  // requested bytes, 0 = to end
  string if_none_match = 4;  // client-held ETag
}

message ReadFileChunk {
  bytes  data         = 1;
  int64  offset       = 2;
  string mime_type    = 3;
  int64  total_size   = 4;
  string etag         = 5;
  bool   not_modified = 6;
}

// ── GetInfo ──

message GetInfoRequest {}

message GetInfoResponse {
  string          name        = 1;
  string          description = 2;
  repeated string commands    = 3;
  bool            has_web     = 4;
  string          version     = 6;
}

// ─── EdgeService ─────────────────────────────────────────────
// Devices connect via bidirectional stream to expose native capabilities
// as Edge Clips. Requires Super Token authentication.
service EdgeService {
  // Device connects and registers its capabilities.
  // Server forwards Invoke/ReadFile/GetInfo requests through this stream.
  rpc Connect(stream EdgeUpstream) returns (stream EdgeDownstream);
}

// Device → Server
message EdgeUpstream {
  oneof msg {
    EdgeManifest  manifest = 1;  // registration: "here's what I can do"
    EdgeResponse  response = 2;  // response to a forwarded request
    EdgePing      ping     = 3;
  }
}

// Server → Device
message EdgeDownstream {
  oneof msg {
    EdgeAccepted  accepted = 1;  // registration accepted
    EdgeRequest   request  = 2;  // forwarded request from a caller
    EdgePong      pong     = 3;
    EdgeRejected  rejected = 4;  // registration rejected
  }
}

// ── Edge Registration ──

message EdgeManifest {
  string name                    = 1;
  string description             = 2;
  repeated EdgeCommandDef commands = 3;
  bool   has_web                 = 4;
}

message EdgeCommandDef {
  string name        = 1;
  string description = 2;
}

message EdgeAccepted {
  string clip_id = 1;  // assigned clip ID
  string token   = 2;  // clip token for callers to invoke this edge clip
}

message EdgeRejected {
  string reason = 1;
}

// ── Edge Request/Response Envelopes ──

// Server → Device: request envelope with correlation ID
message EdgeRequest {
  string request_id = 1;
  oneof body {
    InvokeRequest   invoke   = 10;
    ReadFileRequest read_file = 11;
    GetInfoRequest  get_info  = 12;
    EdgeCancel      cancel    = 13;
  }
}

// Device → Server: response envelope with correlation ID
message EdgeResponse {
  string request_id = 1;
  oneof body {
    InvokeChunk     invoke_chunk = 10;  // may send multiple (streaming)
    ReadFileChunk   read_chunk   = 11;  // may send multiple (streaming)
    GetInfoResponse get_info     = 12;
    EdgeError       error        = 13;  // request-scoped error
    EdgeComplete    complete     = 14;  // explicit completion signal
  }
}

// ── Edge Control Messages ──

message EdgeCancel {}
message EdgeComplete {}
message EdgePing {}
message EdgePong {}

message EdgeError {
  string code    = 1;
  string message = 2;
}
